<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Login Clone</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../Style/login.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- Left Side Image -->
    <div class="left-side">
      <img src="https://i.imgur.com/zqpwkLQ.png" alt="Instagram Preview">
    </div>

    <!-- Right Side Login -->
    <div class="right-side">

      <div class="login-box">

        <h1 class="logo">Instagram</h1>

        <form onsubmit="loginHandler(event)">
          <input type="text" id="email" placeholder="Phone number, username, or email" required>

          <input type="password" id="password" placeholder="Password" required>

          <button type="submit">Log In</button>
        </form>

        <div class="divider">
          <span></span>
          <p>OR</p>
          <span></span>
        </div>

        <a href="#" class="facebook-login">
          Log in with Facebook
        </a>

        <a href="#" class="forgot-password">
          Forgot password?
        </a>

      </div>

      <div class="signup-box">
        <p>
          Don't have an account?
          <a href="signup.html">Sign up</a>
        </p>
      </div>

    </div>

  </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../Js/login.js"></script>
</html>
